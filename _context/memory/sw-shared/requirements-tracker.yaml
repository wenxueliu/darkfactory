# 需求跟踪表 (Requirements Tracker)
# Auto-generated by sw-controller and phase agents
# DO NOT EDIT MANUALLY
#
# 记录所有需求从 ideation 到 delivery 的完整阶段状态和产出物路径。
# 各阶段 Agent 负责更新对应阶段的 status/artifacts/completed_at。
# sw-controller 读取此文件作为阶段转换检查的权威数据源。
#
# --- 字段说明 ---
#
# 需求编号格式: REQ-YYYYMMDD-NNN
#   YYYYMMDD: 需求创建日期
#   NNN: 当天序号，从 001 开始 (自动递增)
#
# 阶段状态 (phase.status):
#   pending:      尚未开始
#   in_progress:  正在进行中
#   done:         已完成
#   blocked:      被阻塞 (需要记录阻塞原因)
#   skipped:      已跳过 (不适用于此需求)
#
# 整体状态 (requirement.status) 推导规则:
#   任一阶段 status == blocked                → blocked
#   任一阶段 status == in_progress             → active
#   所有非 skipped 阶段 status == done         → done
#   所有阶段 status == pending                 → pending
#
# priority:
#   P0: 必做 (战略级)
#   P1: 应做 (高 ROI)
#   P2: 可做 (有资源时)
#   P3: 不做 (已归档)
#
# current_phase 取值 (pipeline 阶段):
#   ideation → design → decomposition → execution → merge → test → delivery
#
# --- 更新责任 (写入者) ---
#
#   sw-requirements-clarifier:  创建条目 + phases.ideation
#   sw-value-judgment:          更新 phases.value_assessment
#   sw-feature-designer:        更新 phases.design
#   sw-task-decomposer:         更新 phases.decomposition
#   sw-plan-executor:           更新 phases.execution (start → in_progress, end → done)
#   sw-finishing-branch:        更新 phases.merge
#   sw-integration-tester:      更新 phases.test
#   sw-delivery-manager:        更新 phases.delivery
#   sw-controller:              读取全局状态; 协调 merge/test 过渡

